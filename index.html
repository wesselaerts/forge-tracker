<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <title>FORGE</title>

  <!-- PWA / iOS -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Forge" />
  <link rel="apple-touch-icon" href="./icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />

  <!-- Pre-compiled Tailwind CSS (no CDN, werkt offline) -->
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./leaflet.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" />

  <style>
    html, body, #root { height: 100%; }
    body {
      background: #09090b;
      color: #f4f4f5;
      margin: 0;
      font-family: 'Manrope', system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }
    #initial-loader {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #09090b; z-index: 9999;
      font-family: 'JetBrains Mono', ui-monospace, monospace; color: #4ade80; font-size: 14px;
    }
    #initial-loader.hidden { display: none; }
  </style>
</head>
<body>
  <div id="initial-loader">laden...</div>
  <div id="root"></div>

  <script src="./app.js" defer></script>
  <script>
    const observer = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        document.getElementById('initial-loader').classList.add('hidden');
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>
</body>
</html>
